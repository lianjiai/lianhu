<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach - 预览模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #F9FAFB;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
        
        .logo svg {
            width: 50px;
            height: 50px;
            color: white;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #6B7280;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .features {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10B981;
            font-size: 20px;
        }
        
        .feature-text {
            text-align: left;
        }
        
        .feature-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .feature-desc {
            font-size: 13px;
            color: #6B7280;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 14px;
            color: #10B981;
            margin-bottom: 30px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(16, 185, 129, 0.5);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #F9FAFB;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .info-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
            font-size: 14px;
            color: #F59E0B;
            line-height: 1.6;
        }
        
        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }
        
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .tech-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #9CA3AF;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6.5 6.5h11M6.5 17.5h11M6 12h12M3 6.5a3.5 3.5 0 117 0 3.5 3.5 0 01-7 0zM3 17.5a3.5 3.5 0 117 0 3.5 3.5 0 01-7 0zM14 12a3.5 3.5 0 117 0 3.5 3.5 0 01-7 0z"/>
            </svg>
        </div>
        
        <h1>FitCoach</h1>
        <p class="subtitle">智能健身私教平台</p>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>构建成功</span>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🤖</div>
                <div class="feature-text">
                    <div class="feature-title">AI 智能教练</div>
                    <div class="feature-desc">GPT-4o 驱动，个性化训练计划</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-text">
                    <div class="feature-title">数据可视化</div>
                    <div class="feature-desc">ECharts 图表，训练数据分析</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">👥</div>
                <div class="feature-text">
                    <div class="feature-title">社交社区</div>
                    <div class="feature-desc">关注互动，动态分享</div>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💎</div>
                <div class="feature-text">
                    <div class="feature-title">会员支付</div>
                    <div class="feature-desc">微信支付，三级会员体系</div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <a href="index.html" class="btn btn-primary">
                <span>🚀</span>
                <span>启动应用</span>
            </a>
            <button class="btn btn-secondary" onclick="showDeployInfo()">
                <span>📖</span>
                <span>查看部署指南</span>
            </button>
        </div>
        
        <div class="tech-stack">
            <span class="tech-tag">Vue 3</span>
            <span class="tech-tag">Vite</span>
            <span class="tech-tag">Tailwind</span>
            <span class="tech-tag">Node.js</span>
            <span class="tech-tag">MongoDB</span>
            <span class="tech-tag">Redis</span>
            <span class="tech-tag">OpenAI</span>
        </div>
        
        <div class="info-box" id="deployInfo" style="display: none;">
            <strong>🌐 生成在线预览链接</strong>
            <p>方案1: Vercel 部署（最简单）</p>
            <code style="display: block; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin: 10px 0; font-family: monospace;">
                npm i -g vercel<br>
                vercel --prod
            </code>
            <p>方案2: 查看完整部署文档</p>
            <code style="display: block; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin: 10px 0; font-family: monospace;">
                打开 DEPLOY_GUIDE.md
            </code>
        </div>
    </div>
    
    <script>
        function showDeployInfo() {
            const info = document.getElementById('deployInfo');
            info.style.display = info.style.display === 'none' ? 'block' : 'none';
        }
        
        // 检测是否支持所需功能
        console.log('FitCoach Preview Mode');
        console.log('Build Time:', new Date().toLocaleString());
        console.log('Location:', window.location.href);
    </script>
</body>
</html>
